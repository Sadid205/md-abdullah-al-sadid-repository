services:
  portfolio-frontend:
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 400M
    image: ghcr.io/sadid205/portfolio-frontend:latest
    command: >
      sh -c "npm run preview -- --host 0.0.0.0 --port 4173"
    ports:
      - "4174:4173"
    restart: unless-stopped
